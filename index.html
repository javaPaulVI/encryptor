<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Encryptor Web Client</title>
</head>
<body>
<h1>Encryptor Interface</h1>

<label for="inputMessage">Message to encrypt:</label><br />
<textarea id="inputMessage" rows="4" cols="50"></textarea><br />
<button onclick="encryptMessage()">Encrypt</button>

<h3>Encrypted Token:</h3>
<pre id="encryptedOutput"></pre>

<label for="inputToken">Token to decrypt:</label><br />
<textarea id="inputToken" rows="4" cols="50"></textarea><br />
<button onclick="decryptToken()">Decrypt</button>

<h3>Decrypted Message:</h3>
<pre id="decryptedOutput"></pre>

<script>
async function encryptMessage() {
    const message = document.getElementById('inputMessage').value;
    const response = await fetch('/encrypt', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message})
    });
    const data = await response.json();
    if (data.error) {
        alert("Error: " + data.error);
    } else {
        document.getElementById('encryptedOutput').textContent = data.encrypted;
    }
}

async function decryptToken() {
    const token = document.getElementById('inputToken').value;
    const response = await fetch('/decrypt', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({token})
    });
    const data = await response.json();
    if (data.error) {
        alert("Error: " + data.error);
    } else {
        document.getElementById('decryptedOutput').textContent =
            `Message: ${data.message}\nTimestamp: ${data.timestamp}`;
    }
}
</script>

</body>
</html>
