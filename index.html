<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Encryptor Demo</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="container">
        <h1>Encryptor Demo</h1>

        <section class="box">
            <h2>Encrypt a Message</h2>
            <textarea id="encrypt-message" placeholder="Enter message to encrypt..."></textarea>
            <button id="encrypt-btn">Encrypt</button>
            <div id="encrypt-result" class="result"></div>
        </section>

        <section class="box">
            <h2>Decrypt a Token</h2>
            <textarea id="decrypt-token" placeholder="Paste token to decrypt..."></textarea>
            <button id="decrypt-btn">Decrypt</button>
            <div id="decrypt-result" class="result"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
