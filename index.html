<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fernet Encryptor (Browser-Compatible)</title>
  <script src="https://cdn.jsdelivr.net/gh/csucu/fernet-browser@master/lib/fernet.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 2em; max-width: 600px; margin: auto; }
    textarea, input, button { width: 100%; margin: 0.5em 0; padding: 0.5em; }
    .output { white-space: pre-wrap; background: #f0f0f0; padding: 1em; }
  </style>
</head>
<body>
  <h2>Python-Compatible Fernet Encryptor</h2>

  <label>Message:</label>
  <textarea id="message"></textarea>

  <button onclick="encrypt()">Encrypt</button>

  <label>Encrypted Token:</label>
  <textarea id="encrypted" readonly></textarea>

  <button onclick="decrypt()">Decrypt</button>

  <label>Decrypted Output:</label>
  <div class="output" id="decrypted"></div>

  <script>
    const PRIMARY_KEY = "SM<iek-nQf5H+-yEu";

    function modifyPrimaryKey(primaryKey) {
      if (primaryKey.length < 6) throw new Error("Primary key too short");
      return primaryKey.slice(0, 4) + "6" + primaryKey.slice(5, -2) + "<" + primaryKey.slice(-1);
    }

    function getSalt(minute) {
      return (minute * 7919).toString().slice(0, 8).padEnd(8, '0');
    }

    async function deriveFernetKey(modifiedKey, salt) {
      const enc = new TextEncoder();
      const baseKey = await crypto.subtle.importKey(
        "raw", enc.encode(modifiedKey), "PBKDF2", false, ["deriveBits"]
      );

      const derivedBits = await crypto.subtle.deriveBits({
        name: "PBKDF2",
        salt: enc.encode(salt),
        iterations: 100000,
        hash: "SHA-256"
      }, baseKey, 256);

      const keyBytes = new Uint8Array(derivedBits);
      return btoa(String.fromCharCode(...keyBytes));
    }

    async function encrypt() {
      const msg = document.getElementById("message").value;
      const currentMinute = Math.floor(Date.now() / 60000);
      const modifiedKey = modifyPrimaryKey(PRIMARY_KEY);
      const salt = getSalt(currentMinute);
      const derived = await deriveFernetKey(modifiedKey, salt);

      const fernet = new Fernet(derived);
      const encrypted = fernet.encode(msg);

      const combined = btoa(`${currentMinute}\x1F${encrypted}`).replace(/=+$/, '');
      document.getElementById("encrypted").value = combined;
      document.getElementById("decrypted").textContent = '';
    }

    async function decrypt() {
      let encoded = document.getElementById("encrypted").value;
      const pad = 4 - (encoded.length % 4);
      if (pad !== 4) encoded += '='.repeat(pad);

      const decoded = atob(encoded);
      const [minuteStr, token] = decoded.split('\x1F');
      const minute = parseInt(minuteStr);
      const modifiedKey = modifyPrimaryKey(PRIMARY_KEY);
      const salt = getSalt(minute);
      const derived = await deriveFernetKey(modifiedKey, salt);

      try {
        const fernet = new Fernet(derived);
        const message = fernet.decode(token);
        document.getElementById("decrypted").textContent = message;
      } catch (e) {
        document.getElementById("decrypted").textContent = "Decryption failed: " + e.message;
      }
    }
  </script>
</body>
</html>
