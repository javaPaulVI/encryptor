<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Encryptor GUI</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 2em auto;
    }
    textarea, input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
    }
    button {
      padding: 10px 20px;
      margin-right: 10px;
    }
    .output {
      white-space: pre-wrap;
      background: #f4f4f4;
      padding: 10px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <h2>Encryptor GUI</h2>

  <label for="inputText">Message:</label>
  <textarea id="inputText" rows="3"></textarea>

  <button onclick="encrypt()">Encrypt</button>
  <button onclick="decrypt()">Decrypt</button>

  <h3>Result:</h3>
  <div class="output" id="result"></div>

  <script>
    async function encrypt() {
      const message = document.getElementById("inputText").value;
      const res = await fetch("http://localhost:5000/encrypt", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message })
      });
      const data = await res.json();
      document.getElementById("result").textContent = data.encrypted || "Encryption failed.";
    }

    async function decrypt() {
      const token = document.getElementById("inputText").value;
      const res = await fetch("http://localhost:5000/decrypt", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ token })
      });
      const data = await res.json();
      document.getElementById("result").textContent = data.decrypted || "Decryption failed.";
    }
  </script>
</body>
</html>
